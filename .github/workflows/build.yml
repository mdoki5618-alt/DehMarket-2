name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Electron and Electron Builder
        run: npm install --save-dev electron electron-builder

      - name: Build web app
        run: npm run build

      - name: Package portable EXE
        run: npx electron-builder --win portable

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DehMarket_POS
          path: desktop-output/*.exe
